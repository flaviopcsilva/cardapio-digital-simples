<div class="container">

  <div class="header">
    <img src="assets/logo.jpeg" alt="Logo">
  </div>

  <!-- MESA -->
  <div class="mesa">
    <input type="text" [(ngModel)]="mesa" placeholder="Número da mesa">
  </div>

  <!-- PRODUTOS -->
  <div class="lista">
    <div class="item" *ngFor="let produto of produtos">

      <img [src]="produto.imagem">

      <div class="info">
        <h2>{{ produto.nome }}</h2>
        <p>{{ produto.descricao }}</p>
        <span>R$ {{ produto.preco.toFixed(2) }}</span>

        <button (click)="adicionar(produto)">
          Adicionar
        </button>
      </div>

    </div>
  </div>

  <!-- CARRINHO -->
  <div class="carrinho" *ngIf="carrinho.length > 0">

    <h2>🛒 Seu Pedido</h2>

    <div *ngFor="let item of carrinho; let i = index">
      {{ item.nome }} - R$ {{ item.preco.toFixed(2) }}
      <button (click)="remover(i)">❌</button>
    </div>

    <h3>Total: R$ {{ total.toFixed(2) }}</h3>

    <button class="finalizar" (click)="enviarPedido()">
      Enviar Pedido
    </button>

  </div>

</div>
